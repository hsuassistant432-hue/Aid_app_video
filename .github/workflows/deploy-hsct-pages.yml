name: Deploy HSCT video site

on:
  push:
    branches: [master]
    paths:
      - "HSCT/**"
      - ".github/workflows/deploy-hsct-pages.yml"
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout HSCT site
        uses: actions/checkout@v7
        with:
          ref: master
          sparse-checkout: HSCT

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload HSCT site
        uses: actions/upload-pages-artifact@v4
        with:
          path: HSCT

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
